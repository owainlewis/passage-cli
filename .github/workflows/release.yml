name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - run: go test ./...

  build:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          mkdir -p dist package
          binary="passage"
          if [ "$GOOS" = "windows" ]; then
            binary="passage.exe"
          fi
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "package/${binary}" \
            ./cmd/passage
          name="passage_${VERSION}_${GOOS}_${GOARCH}"
          if [ "$ARCHIVE" = "zip" ]; then
            (cd package && zip -q "../dist/${name}.zip" "$binary")
            (cd dist && shasum -a 256 "${name}.zip" > "${name}.zip.sha256")
          else
            tar -czf "dist/${name}.tar.gz" -C package "$binary"
            (cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256")
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: passage-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Check for release notes
        id: notes
        run: |
          set -euo pipefail
          notes=".github/release-notes/${GITHUB_REF_NAME}.md"
          if [ -f "$notes" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "path=$notes" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        if: steps.notes.outputs.exists == 'true'
        with:
          files: dist/*
          body_path: ${{ steps.notes.outputs.path }}

      - uses: softprops/action-gh-release@v2
        if: steps.notes.outputs.exists != 'true'
        with:
          files: dist/*
          generate_release_notes: true
